name: Tests

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Install package with dev dependencies
        run: uv venv && uv pip install -e ".[dev]"

      - name: Run tests
        run: uv run pytest --cov=us_marine_energy_resource -m "not integration"

  # Integration tests download data from the public S3 bucket, so they run in
  # a single job instead of repeating the downloads across the whole matrix.
  integration:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Install package with dev dependencies
        run: uv venv && uv pip install -e ".[dev]"

      - name: Run integration tests
        run: uv run pytest -m integration

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.10"
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Install package with dev dependencies
        run: uv venv && uv pip install -e ".[dev]"

      - name: Lint
        run: uv run make lint
